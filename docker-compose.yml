# دو حالت اجرا:
#
#   ۱) نسخهٔ سبک (فقط /ask + ورود + تب پیام‌ها) — سریع:
#        docker compose up --build
#
#   ۲) نسخهٔ کامل (RAG + مدیریت فایل) — سنگین (torch/faiss). مدل‌ها (Qwen2.5-7B
#      و embedder) «هنگام build» دانلود می‌شوند، پس بار اول build طول می‌کشد ولی
#      اجرا سریع و بدون دانلود است:
#        docker compose up --build app-full
#
# هر دو روی پورت 8000 هستند ولی هم‌زمان اجرا نمی‌شوند (نسخهٔ کامل با profile جدا
# شده تا «docker compose up» بدون آرگومان فقط نسخهٔ سبک را بالا بیاورد).

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      LLM_DB_HOST: db
      LLM_DB_PORT: "3306"
      LLM_DB_USER: teamgram
      LLM_DB_PASSWORD: teamgram
      LLM_DB_NAME: teamgram
      # اعتبارنامهٔ ورود به پنل ادمین (حتماً در محیط واقعی تغییر دهید)
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin1234
    depends_on:
      db:
        condition: service_healthy

  # نسخهٔ کامل با RAG و مدیریت فایل. فقط با نام صریح بالا می‌آید:
  #   docker compose up --build app-full
  app-full:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.full
      # توکن HuggingFace هنگام build به‌صورت secret منتقل می‌شود (در ایمیج بِیک نمی‌شود).
      secrets:
        - hf_token
    ports:
      - "8000:8000"
    environment:
      LLM_DB_HOST: db
      LLM_DB_PORT: "3306"
      LLM_DB_USER: teamgram
      LLM_DB_PASSWORD: teamgram
      LLM_DB_NAME: teamgram
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin1234
      # مدل‌ها داخل ایمیج بِیک شده‌اند؛ آفلاین کن تا کتابخانه‌ها هنگام لود سراغ
      # HF Hub نروند و روی پروکسی ناپایدار هنگ نکنند (علت گیرکردنِ استارتاپ).
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_DISABLE_XET: "1"
    volumes:
      # فایل‌های آپلودی روی هاست بمانند (هنگام استارت همه به RAG اضافه می‌شوند)
      - ./doc:/app/doc
      # نکته: کش مدل‌ها عمداً به‌صورت volume mount نمی‌شود. مدل‌ها هنگام build داخل
      # ایمیج بِیک شده‌اند؛ اگر volume خالی/ناقص روی /root/.cache/huggingface سوار شود
      # کشِ کاملِ ایمیج را سایه می‌کند و اپ سعی می‌کند مدل را دوباره دانلود کند.
    # دسترسی به GPU انویدیا — الزامی برای اجرای مدل AWQ 4-bit (autoawq فقط روی GPU انویدیا).
    # نیازمند نصب NVIDIA Container Toolkit روی هاست. معادلِ compose برای --gpus all.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: teamgram
      MYSQL_DATABASE: teamgram
      MYSQL_USER: teamgram
      MYSQL_PASSWORD: teamgram
    # پورت 3306 روی هاست منتشر نمی‌شود؛ اپ از طریق شبکهٔ داخلی داکر (db:3306)
    # وصل می‌شود. اگر می‌خواهی از بیرون (مثلاً DBeaver) وصل شوی، خط زیر را باز کن
    # و مطمئن شو MySQL محلی دیگری روی 3306 اجرا نیست:
    # ports:
    #   - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pteamgram"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:

# توکن HuggingFace برای دانلود مدل‌ها هنگام build.
# روش پیش‌فرض: متغیّر محیطی HF_TOKEN را ست کن، مثلاً:
#     export HF_TOKEN=hf_xxxxxxxxxxxxxxxx
#     docker compose up --build app-full
# روش جایگزین (فایل): خط environment زیر را کامنت کن و به‌جایش از file استفاده کن:
#     file: ./hf_token.txt
secrets:
  hf_token:
    environment: HF_TOKEN
