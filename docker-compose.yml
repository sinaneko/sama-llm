# دو حالت اجرا:
#
#   ۱) نسخهٔ سبک (فقط /ask + ورود + تب پیام‌ها) — سریع:
#        docker compose up --build
#
#   ۲) نسخهٔ کامل (RAG + مدیریت فایل). LLM روی سرویس «ollama» با GPU اجرا می‌شود و
#      embedder روی CPU داخل app-full. مدل LLM (qwen2.5:7b) بار اول خودکار pull می‌شود:
#        docker compose up --build app-full
#      (سرویس ollama و db به‌صورت وابستگی خودکار بالا می‌آیند.)
#
# هر دو روی پورت 8000 هستند ولی هم‌زمان اجرا نمی‌شوند (نسخهٔ کامل با profile جدا
# شده تا «docker compose up» بدون آرگومان فقط نسخهٔ سبک را بالا بیاورد).

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      LLM_DB_HOST: db
      LLM_DB_PORT: "3306"
      LLM_DB_USER: teamgram
      LLM_DB_PASSWORD: teamgram
      LLM_DB_NAME: teamgram
      # اعتبارنامهٔ ورود به پنل ادمین (حتماً در محیط واقعی تغییر دهید)
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin1234
    depends_on:
      db:
        condition: service_healthy

  # نسخهٔ کامل با RAG و مدیریت فایل. فقط با نام صریح بالا می‌آید:
  #   docker compose up --build app-full
  app-full:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.full
      # توکن HuggingFace هنگام build به‌صورت secret منتقل می‌شود (در ایمیج بِیک نمی‌شود).
      secrets:
        - hf_token
    ports:
      - "8000:8000"
    environment:
      LLM_DB_HOST: db
      LLM_DB_PORT: "3306"
      LLM_DB_USER: teamgram
      LLM_DB_PASSWORD: teamgram
      LLM_DB_NAME: teamgram
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin1234
      # embedder داخل ایمیج بِیک شده؛ آفلاین کن تا هنگام لود سراغ HF Hub نرود.
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_DISABLE_XET: "1"
      # آدرس سرویس Ollama (LLM) و نام مدل. اپ هنگام استارت مدل را در صورت نبود pull می‌کند.
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "qwen2.5:7b"
    volumes:
      # فایل‌های آپلودی روی هاست بمانند (هنگام استارت همه به RAG اضافه می‌شوند)
      - ./doc:/app/doc
    # این کانتینر GPU نمی‌خواهد (embedder روی CPU)؛ GPU فقط روی سرویس ollama است.
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # سرویس LLM. مدل qwen2.5:7b روی این کانتینر و با GPU انویدیا اجرا می‌شود.
  # روی کارت‌های Blackwell (سری RTX 50 / RTX PRO) به‌صورت خودکار کار می‌کند.
  ollama:
    profiles: ["full"]
    image: ollama/ollama:latest
    # دسترسی به GPU انویدیا — نیازمند نصب NVIDIA Container Toolkit روی هاست.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      # مدل‌های دانلودشدهٔ Ollama روی volume بمانند تا با هر restart دوباره دانلود نشوند.
      - ollama_data:/root/.ollama
    # سلامت سرویس: app-full تا وقتی Ollama واقعاً پاسخگو نشده بالا نمی‌آید (شرط service_healthy).
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 12
    # (اختیاری) اگر خواستی از بیرونِ داکر هم به Ollama وصل شوی، این را باز کن:
    # ports:
    #   - "11434:11434"

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: teamgram
      MYSQL_DATABASE: teamgram
      MYSQL_USER: teamgram
      MYSQL_PASSWORD: teamgram
    # پورت 3306 روی هاست منتشر نمی‌شود؛ اپ از طریق شبکهٔ داخلی داکر (db:3306)
    # وصل می‌شود. اگر می‌خواهی از بیرون (مثلاً DBeaver) وصل شوی، خط زیر را باز کن
    # و مطمئن شو MySQL محلی دیگری روی 3306 اجرا نیست:
    # ports:
    #   - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pteamgram"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  ollama_data:

# توکن HuggingFace برای دانلود مدل‌ها هنگام build.
# روش پیش‌فرض: متغیّر محیطی HF_TOKEN را ست کن، مثلاً:
#     export HF_TOKEN=hf_xxxxxxxxxxxxxxxx
#     docker compose up --build app-full
# روش جایگزین (فایل): خط environment زیر را کامنت کن و به‌جایش از file استفاده کن:
#     file: ./hf_token.txt
secrets:
  hf_token:
    environment: HF_TOKEN
